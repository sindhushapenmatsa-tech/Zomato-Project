name: Enterprise CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  checks: write
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  IMAGE_NAME: ${{ secrets.DOCKER_USER }}/zomato
  IMAGE_TAG: ${{ github.sha }}

###########################################################
# BUILD JOB
###########################################################

jobs:

  build:

    name: Build React Application
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Verify Installed Packages
        run: npm ls || true

      - name: Run ESLint
        run: npm run lint

      - name: Run Unit Tests
        env:
          CI: true
        run: |
          echo "Running Tests..."
          npm test -- --watchAll=false || true

      - name: Build React App
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: |
            build
            package.json
            package-lock.json
            Dockerfile

###########################################################
# SECURITY + DOCKER
###########################################################

  security:

    name: Security & Docker Validation

    needs: build

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: .

###########################################################
# Gitleaks
###########################################################

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GT }}

###########################################################
# Trivy
###########################################################

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@master

      - name: Run Trivy Filesystem Scan
        run: |
          trivy fs \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-results.sarif \
            .

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

###########################################################
# Hadolint
###########################################################

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

###########################################################
# Docker Buildx
###########################################################

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

###########################################################
# Docker Login
###########################################################

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

###########################################################
# Docker Cache
###########################################################

      - name: Restore Docker Cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ github.sha }}
          restore-keys: |
            buildx-

###########################################################
# Build Docker Image
###########################################################

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile

          load: true
          push: false

          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest

          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new

###########################################################
# Update Cache
###########################################################

      - name: Update Docker Cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

###########################################################
# Verify Image
###########################################################

      - name: Verify Docker Image
        run: |
          docker images
          docker image inspect ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

###########################################################
# Push Image
###########################################################

      - name: Push Docker Image
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_NAME }}:latest

###########################################################
# Smoke Test
###########################################################

      - name: Run Container
        run: |
          docker run -d \
            --name zomato-test \
            -p 3000:3000 \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Wait for Container
        run: sleep 20

      - name: Verify Container
        run: |
          docker ps
          docker logs zomato-test

###########################################################
# Cleanup
###########################################################

      - name: Cleanup
        if: always()
        run: |
          docker rm -f zomato-test || true
